repositories:
  default:
    branches:
      main:
        dismiss_stale_reviews: true
        required_approving_review_count: 1
        enforce_admins: true
        required_status_checks:
          require_review: true

      develop:
        dismiss_stale_reviews: true
        required_approving_review_count: 1
        enforce_admins: true
        required_status_checks:
          require_review: true

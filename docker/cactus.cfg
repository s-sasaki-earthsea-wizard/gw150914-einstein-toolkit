# Einstein Toolkit ビルドオプション (Docker 環境用)
# =================================================================
# 公式 jupyter-et tutorial.cfg を踏襲しつつ、本プロジェクト向けに調整。
# Kruskal release (ET_2025_05) で検証する想定。
#
# このファイルを変更したら VERSION 文字列も更新すること。
# VERSION が変わると SimFactory はアプリケーションを再構成・再ビルドする。

VERSION = 2026-04-23

# ---- コンパイラ ----
CPP = cpp
CC  = gcc
CXX = g++
FPP = cpp
F90 = gfortran

# ---- 前処理フラグ ----
CPPFLAGS =
FPPFLAGS = -traditional

# ---- 言語フラグ ----
CFLAGS   = -g -std=gnu99
CXXFLAGS = -g -std=gnu++17
F90FLAGS = -g -fcray-pointer -ffixed-line-length-none

# ---- リンカ ----
LDFLAGS = -rdynamic

# ---- デバッグ・最適化 ----
DEBUG              = no
CPP_DEBUG_FLAGS    =
C_DEBUG_FLAGS      =
CXX_DEBUG_FLAGS    =

OPTIMISE           = yes
CPP_OPTIMISE_FLAGS =
C_OPTIMISE_FLAGS   = -O2
CXX_OPTIMISE_FLAGS = -O2
F90_OPTIMISE_FLAGS = -O2

PROFILE            = no
CPP_PROFILE_FLAGS  =
C_PROFILE_FLAGS    = -pg
CXX_PROFILE_FLAGS  = -pg
F90_PROFILE_FLAGS  = -pg

WARN               = yes
CPP_WARN_FLAGS     = -Wall
C_WARN_FLAGS       = -Wall
CXX_WARN_FLAGS     = -Wall
F90_WARN_FLAGS     = -Wall

# ---- OpenMP (スレッド並列) ----
OPENMP           = yes
CPP_OPENMP_FLAGS = -fopenmp
FPP_OPENMP_FLAGS = -D_OPENMP
C_OPENMP_FLAGS   = -fopenmp
CXX_OPENMP_FLAGS = -fopenmp
F90_OPENMP_FLAGS = -fopenmp

# ---- ベクトル化 ----
VECTORISE                = yes
VECTORISE_ALIGNED_ARRAYS = no
VECTORISE_INLINE         = yes

# ---- 拡張ライブラリ (Dockerfile で /usr/local にインストール済み) ----
PTHREADS_DIR = NO_BUILD

ADIOS2_DIR      = /usr/local
ADIOS2_INC_DIRS = /usr/local/include
ADIOS2_LIB_DIRS = /usr/local/lib
ADIOS2_LIBS     = adios2_cxx11_mpi adios2_c_mpi adios2_core_mpi adios2_cxx11 adios2_c adios2_core

NSIMD_SIMD = SSE2
